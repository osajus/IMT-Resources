name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build dist using releaseignore
        run: |
          mkdir -p dist
          rsync -av --exclude-from='.releaseignore' \
            --exclude 'dist' \
            ./ dist/

      - name: Zip dist
        run: cd dist && zip -r ../release.zip .

      - name: Compute values
        id: vals
        run: |
          echo "hash=$(sha256sum release.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "link=https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/release.zip" >> "$GITHUB_OUTPUT"

      - name: Generate README from template
        run: |
          sed \
            -e "s|PH4475|${{ steps.vals.outputs.link }}|g" \
            -e "s|PH8989|${{ steps.vals.outputs.version }}|g" \
            -e "s|PH2841|${{ steps.vals.outputs.hash }}|g" \
            README.template.md > README.md

      - name: Commit updated README
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Update README for ${{ steps.vals.outputs.version }}" || echo "No changes"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release.zip