name: Release

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ... your existing build/zip steps ...

      - name: Compute values
        id: vals
        run: |
          echo "hash=$(sha256sum release.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "link=https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate README from template
        run: |
          sed \
            -e "s|VERSION|${{ steps.vals.outputs.version }}|g" \
            -e "s|VERSIONLINK|${{ steps.vals.outputs.link }}|g" \
            -e "s|HASH|${{ steps.vals.outputs.hash }}|g" \
            README.template.md > README.md

      - name: Commit updated README
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Update README for ${{ steps.vals.outputs.version }}" || echo "No changes"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release.zip